spring:
  application:
    name: ai-service

  ai:
    model:
      chat: openai
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none

    openai:
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
      embedding:
        enabled: false

    google:
      genai:
        embedding:
          options:
            model: gemini-embedding-001
        chat:
          enabled: false

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

    vectorstore:
      pgvector:
        table-name: vector_store
        initialize-schema: true

  sql:
    init:
      mode: always
      schema-locations: classpath:init/schema.sql

groq:
  api-key: /Fittrack/ai-srvc/groq/apiKey
  base-url: https://api.groq.com/openai
  chat-model: llama-3.3-70b-versatile

google:
  genai:
    api-key: /Fittrack/ai-srvc/gemini/apiKey
    embedding-model: gemini-embedding-001

rabbitmq:
  uri: /Fittrack/rabbitmq/uri
  queue:
    activity-queue: activity_queue
    nutrition-queue: nutrition_queue
    user-queue: user_queue

aws:
  ssm:
    region: ap-south-1

  iam-user:
    accessKey: /Fittrack/accessKey
    secretKey: /Fittrack/secretKey

  postgres-db:
    url: /Fittrack/postgres-db/url
    username: /Fittrack/postgres-db/username
    password: /Fittrack/postgres-db/password
    driver-class-name: org.postgresql.Driver

mongodb:
  uri: /Fittrack/ai-srvc/mongodb/uri
  database: /Fittrack/ai-srvc/mongodb/database

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8073